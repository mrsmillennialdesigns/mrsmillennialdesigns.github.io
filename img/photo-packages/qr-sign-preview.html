<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;padding:40px;background:#faf8f5;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Georgia,serif}
.card{background:#fff;border-radius:20px;padding:48px 40px;text-align:center;max-width:400px;box-shadow:0 8px 40px rgba(45,41,38,0.1);border:1px solid rgba(45,41,38,0.06)}
.card h1{font-size:28px;font-weight:400;color:#2d2926;margin-bottom:8px;letter-spacing:-0.5px}
.card p{font-size:15px;color:#6b5f58;line-height:1.6;margin-bottom:24px}
.qr-box{width:200px;height:200px;margin:0 auto 24px;background:#f3efe8;border-radius:16px;display:flex;align-items:center;justify-content:center;border:2px dashed #dbc9a0}
.qr-box svg{width:160px;height:160px}
.card .small{font-size:12px;color:#9b9088;margin-top:16px;font-family:-apple-system,sans-serif}
.gold{color:#b8965a;font-weight:600}
.divider{width:60px;height:2px;background:#dbc9a0;margin:0 auto 20px;border-radius:2px}
</style>
</head>
<body>
<div class="card">
  <h1>Share Your Photos</h1>
  <div class="divider"></div>
  <p>Scan the QR code below to upload<br>your photos from tonight</p>
  <div class="qr-box">
    <svg viewBox="0 0 100 100" fill="#2d2926">
      <rect x="5" y="5" width="25" height="25" rx="3"/>
      <rect x="70" y="5" width="25" height="25" rx="3"/>

      <rect x="10" y="10" width="15" height="15" rx="2" fill="#fff"/>

      <rect x="10" y="75" width="15" height="15" rx="2" fill="#fff"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
      <rect x="79" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="79" width="7" height="7" rx="1"/>
      <rect x="35" y="5" width="5" height="5"/>
      <rect x="45" y="5" width="5" height="5"/>
      <rect x="55" y="5" width="5" height="5"/>
      <rect x="35" y="15" width="5" height="5"/>
      <rect x="45" y="15" width="10" height="5"/>
      <rect x="35" y="25" width="5" height="5"/>
      <rect x="50" y="25" width="5" height="5"/>
      <rect x="60" y="25" width="5" height="5"/>
      <rect x="5" y="35" width="5" height="5"/>
      <rect x="15" y="35" width="5" height="5"/>
      <rect x="25" y="40" width="5" height="5"/>
      <rect x="35" y="35" width="5" height="10"/>
      <rect x="45" y="35" width="5" height="5"/>
      <rect x="55" y="35" width="5" height="5"/>
      <rect x="65" y="35" width="5" height="5"/>
      <rect x="5" y="45" width="5" height="5"/>
      <rect x="15" y="50" width="5" height="5"/>
      <rect x="25" y="45" width="5" height="5"/>
      <rect x="45" y="45" width="5" height="5"/>
      <rect x="55" y="45" width="5" height="5"/>
      <rect x="5" y="55" width="5" height="5"/>
      <rect x="25" y="55" width="5" height="5"/>
      <rect x="35" y="55" width="5" height="5"/>
      <rect x="45" y="55" width="10" height="5"/>
      <rect x="60" y="55" width="5" height="5"/>
      <rect x="70" y="35" width="5" height="5"/>
      <rect x="80" y="35" width="5" height="5"/>
      <rect x="90" y="35" width="5" height="5"/>
      <rect x="70" y="45" width="5" height="5"/>
      <rect x="85" y="45" width="5" height="5"/>
      <rect x="70" y="55" width="10" height="5"/>
      <rect x="85" y="55" width="10" height="5"/>
      <rect x="70" y="65" width="5" height="5"/>
      <rect x="80" y="70" width="5" height="5"/>
      <rect x="90" y="70" width="5" height="5"/>
      <rect x="70" y="80" width="5" height="5"/>
      <rect x="85" y="80" width="5" height="5"/>
      <rect x="70" y="90" width="5" height="5"/>

      <rect x="60" y="65" width="5" height="5"/>
    </svg>
  </div>
  <p style="margin-bottom:8px"><span class="gold">Every photo matters</span></p>
  <p style="font-size:13px;margin-bottom:0">The more you share, the more<br>beautiful the album will be</p>
  <p class="small">Powered by MrsMillennial Designs</p>
</div>
</body>
</html>
