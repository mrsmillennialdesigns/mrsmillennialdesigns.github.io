<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');
body{margin:0;padding:40px;background:#f5f0e8;display:flex;justify-content:center;align-items:center;min-height:100vh}
.frame{background:#fff;border-radius:4px;padding:12px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.card{border:1.5px solid #c8b88a;padding:56px 48px;text-align:center;max-width:380px;position:relative}
.card::before,.card::after{content:'';position:absolute;width:24px;height:24px;border-color:#c8b88a;border-style:solid}
.card::before{top:8px;left:8px;border-width:1.5px 0 0 1.5px}
.card::after{bottom:8px;right:8px;border-width:0 1.5px 1.5px 0}
h1{font-family:'Playfair Display',Georgia,serif;font-size:42px;font-weight:400;font-style:italic;color:#2d2926;margin:0 0 4px;line-height:1.15;letter-spacing:-0.5px}
h2{font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:400;color:#2d2926;margin:0 0 24px;letter-spacing:2px;text-transform:uppercase}
.sub{font-family:'Lato',sans-serif;font-size:14px;color:#8a7e72;line-height:1.6;margin-bottom:28px;font-weight:300}
.qr-wrap{width:180px;height:180px;margin:0 auto 28px;display:flex;align-items:center;justify-content:center}
.qr-wrap svg{width:160px;height:160px}
.divider{display:flex;align-items:center;gap:12px;margin:0 auto 20px;max-width:180px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#dbc9a0}
.divider-star{color:#c8b88a;font-size:14px}
.tagline{font-family:'Lato',sans-serif;font-size:13px;color:#a89880;line-height:1.5;margin:0;font-weight:300}
.brand{font-family:'Lato',sans-serif;font-size:10px;color:#c8b88a;margin-top:24px;letter-spacing:1.5px;text-transform:uppercase}
</style>
</head>
<body>
<div class="frame">
<div class="card">
  <h1>Share</h1>
  <h2>the Moment</h2>
  <p class="sub">We're building a photo album!<br>Scan to upload your best shots</p>
  <div class="qr-wrap">
    <svg viewBox="0 0 100 100" fill="#2d2926">
      <rect x="5" y="5" width="25" height="25" rx="2"/><rect x="70" y="5" width="25" height="25" rx="2"/><rect x="5" y="70" width="25" height="25" rx="2"/>
      <rect x="10" y="10" width="15" height="15" rx="1" fill="#fff"/><rect x="75" y="10" width="15" height="15" rx="1" fill="#fff"/><rect x="10" y="75" width="15" height="15" rx="1" fill="#fff"/>
      <rect x="14" y="14" width="7" height="7"/><rect x="79" y="14" width="7" height="7"/><rect x="14" y="79" width="7" height="7"/>
      <rect x="35" y="5" width="5" height="5"/><rect x="45" y="5" width="5" height="5"/><rect x="55" y="5" width="5" height="5"/>
      <rect x="35" y="15" width="5" height="5"/><rect x="45" y="15" width="10" height="5"/><rect x="35" y="25" width="5" height="5"/>
      <rect x="50" y="25" width="5" height="5"/><rect x="60" y="25" width="5" height="5"/><rect x="5" y="35" width="5" height="5"/>
      <rect x="15" y="35" width="5" height="5"/><rect x="25" y="40" width="5" height="5"/><rect x="35" y="35" width="5" height="10"/>
      <rect x="45" y="35" width="5" height="5"/><rect x="55" y="35" width="5" height="5"/><rect x="65" y="35" width="5" height="5"/>
      <rect x="5" y="45" width="5" height="5"/><rect x="15" y="50" width="5" height="5"/><rect x="25" y="45" width="5" height="5"/>
      <rect x="45" y="45" width="5" height="5"/><rect x="55" y="45" width="5" height="5"/><rect x="5" y="55" width="5" height="5"/>
      <rect x="25" y="55" width="5" height="5"/><rect x="35" y="55" width="5" height="5"/><rect x="45" y="55" width="10" height="5"/>
      <rect x="60" y="55" width="5" height="5"/><rect x="70" y="35" width="5" height="5"/><rect x="80" y="35" width="5" height="5"/>
      <rect x="90" y="35" width="5" height="5"/><rect x="70" y="45" width="5" height="5"/><rect x="85" y="45" width="5" height="5"/>
      <rect x="70" y="55" width="10" height="5"/><rect x="85" y="55" width="10" height="5"/><rect x="70" y="65" width="5" height="5"/>
      <rect x="80" y="70" width="5" height="5"/><rect x="90" y="70" width="5" height="5"/><rect x="70" y="80" width="5" height="5"/>
      <rect x="85" y="80" width="5" height="5"/><rect x="70" y="90" width="5" height="5"/><rect x="80" y="90" width="5" height="5"/>
      <rect x="90" y="90" width="5" height="5"/><rect x="35" y="65" width="5" height="5"/><rect x="50" y="65" width="5" height="5"/>
      <rect x="60" y="65" width="5" height="5"/>
    </svg>
  </div>
  <div class="divider"><span class="divider-star">&#10022;</span></div>
  <p class="tagline">Every photo you share helps us create<br>a beautiful keepsake of tonight</p>
  <p class="brand">MrsMillennial Designs</p>
</div>
</div>
</body>
</html>
