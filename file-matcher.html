<!DOCTYPE html>
<html lang="en">
<head>

<title>File Matcher — MrsMillennial Designs</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#e0e0e0;padding:20px;max-width:960px;margin:0 auto}
h1{font-size:1.5rem;color:#f0c040;margin-bottom:4px}
.sub{color:#888;font-size:13px;margin-bottom:16px}

.stats{display:flex;gap:16px;margin-bottom:16px;font-size:13px;flex-wrap:wrap}
.stat{background:#1a1a2e;padding:6px 14px;border-radius:8px}
.stat b{color:#f0c040}

.search-bar{display:flex;gap:10px;margin-bottom:16px;position:sticky;top:0;background:#111;padding:8px 0;z-index:50}
.search-bar input{flex:1;background:#1a1a2e;border:1px solid #333;color:#e0e0e0;padding:8px 14px;border-radius:8px;font-size:14px}
.search-bar input:focus{outline:none;border-color:#f0c040}
.search-bar select{background:#1a1a2e;border:1px solid #333;color:#e0e0e0;padding:8px;border-radius:8px;font-size:13px}

/* Accordion listing */
.listing{background:#1a1a2e;border:1px solid #282840;border-radius:8px;margin-bottom:8px;overflow:hidden}
.listing.done{border-color:#2a5a2a}
.listing.skip{border-color:#5a2a2a;opacity:.6}

.lhead{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;user-select:none;transition:background .15s}
.lhead:hover{background:#222240}
.lhead img{width:180px;height:180px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#222;pointer-events:none}
.lhead .info{flex:1;min-width:0}
.lhead .title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lhead .meta{font-size:10px;color:#666;margin-top:1px}
.lhead .arrow{color:#555;font-size:16px;transition:transform .2s;flex-shrink:0}
.listing.open .lhead .arrow{transform:rotate(90deg)}
.lhead .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0;pointer-events:none}
.badge.g{background:#2a5a2a;color:#7cdb7c}
.badge.y{background:#3a3a20;color:#dba040}
.badge.r{background:#4a2020;color:#db7070}

.lbody{display:none;padding:12px 14px;border-top:1px solid #222}
.listing.open .lbody{display:block}

/* Assigned area */
.assigned-box{background:#0a0a14;border:2px dashed #2a5a2a;border-radius:8px;padding:12px;min-height:56px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;transition:all .2s}
.assigned-box.dragover{border-color:#f0c040;background:#1a1a0a;box-shadow:0 0 20px rgba(240,192,64,.15)}
.assigned-box .placeholder{font-size:12px;color:#555;text-align:center;width:100%}

.chip{display:inline-flex;align-items:center;gap:4px;background:#222;border:1px solid #333;padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer;user-select:none;transition:border-color .15s}
.chip:hover{border-color:#f0c040}
.chip .x{font-size:12px;color:#666;margin-left:2px}.chip .x:hover{color:#f06060}
.chip .e{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px}
.e.pdf{background:#3a1515;color:#e07070}
.e.jpg,.e.jpeg{background:#3a3a15;color:#d0c060}
.e.png{background:#153a3a;color:#60c0d0}
.e.svg{background:#2a153a;color:#a060d0}

.section-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;margin-top:8px}

.suggestions{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}

/* All files dropdown */
.all-files{margin-top:8px}
.all-toggle{font-size:11px;color:#5580bb;cursor:pointer;margin-bottom:6px;display:inline-block}
.all-toggle:hover{color:#80b0ff}
.file-search{background:#111;border:1px solid #333;color:#ccc;padding:4px 8px;border-radius:5px;font-size:11px;width:100%;margin-bottom:6px}
.file-grid{max-height:200px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:3px;padding:2px}

.btns{display:flex;gap:6px;margin-top:10px}
.btn{padding:5px 12px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:600}
.btn-ok{background:#2a5a2a;color:#7cdb7c}.btn-ok:hover{background:#3a7a3a}
.btn-no{background:#3a2020;color:#db7070}.btn-no:hover{background:#5a3030}
.btn-clr{background:#222240;color:#8888bb}.btn-clr:hover{background:#333360}

.desc-hint{font-size:10px;color:#555;margin-bottom:8px;max-height:40px;overflow:hidden;line-height:1.4}

.toolbar{position:sticky;bottom:0;background:#111;padding:12px 0;border-top:1px solid #282840;display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.export-btn{background:#f0c040;color:#111;padding:8px 24px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:700}
.export-btn:hover{background:#f0d060}
</style>
</head>

<h1>File Matcher</h1>

// State
let asgn = {};   // lid -> [fnames]
let skips = {};   // lid -> true
let openId = null;

// Load saved progress
try {
  const s = JSON.parse(localStorage.getItem('mmd-matcher2') || '{}');
  if (s.a) asgn = s.a;
  if (s.s) skips = s.s;
} catch(e) {}

function save() {
  localStorage.setItem('mmd-matcher2', JSON.stringify({a:asgn, s:skips}));
}

function ext(f) {
  const parts = f.split('.');
  let e = parts.pop().toLowerCase();
  // handle .pdf.pdf
  if (parts.length > 1 && parts[parts.length-1].toLowerCase() === e) e = e;
  return e;
}

function chipHTML(fname, removable) {
  const e = ext(fname);
  const display = fname.length > 35 ? fname.substring(0,32)+'...' : fname;
  const rm = removable ? `<span class="x" data-rm="${fname}">&times;</span>` : '';
  return `<span class="chip" draggable="true" data-f="${fname}" title="${fname}"><span class="e ${e}">${e}</span>${display}${rm}</span>`;
}

function stats() {
  const total = DATA.l.length;
  const done = Object.keys(asgn).filter(k => asgn[k]?.length > 0).length;
  const skip = Object.keys(skips).length;
  document.getElementById('st').textContent = total;
  document.getElementById('sd').textContent = done;
  document.getElementById('ss').textContent = skip;
  document.getElementById('sl').textContent = total - done - skip;
  document.getElementById('prog').textContent = `${done+skip}/${total}`;
}

function usedFiles() {
  const s = new Set();
  for (const arr of Object.values(asgn)) arr.forEach(f => s.add(f));
  return s;
}

function render() {
  const el = document.getElementById('list');
  const q = document.getElementById('search').value.toLowerCase();
  const flt = document.getElementById('filter').value;
  const used = usedFiles();

  // Sort: unmatched first, then matched, then skipped
  const sorted = [...DATA.l].sort((a,b) => {
    const aS = skips[a.id] ? 2 : (asgn[a.id]?.length > 0 ? 1 : 0);
    const bS = skips[b.id] ? 2 : (asgn[b.id]?.length > 0 ? 1 : 0);
    return aS !== bS ? aS - bS : a.t.localeCompare(b.t);
  });

  let html = '';
  for (const li of sorted) {
    const hasFi = asgn[li.id]?.length > 0;
    const isSkip = !!skips[li.id];
    if (flt === 'todo' && (hasFi || isSkip)) continue;
    if (flt === 'done' && !hasFi) continue;
    if (flt === 'skip' && !isSkip) continue;
    if (q && !li.t.toLowerCase().includes(q)) continue;

    const cls = `listing${hasFi?' done':''}${isSkip?' skip':''}${openId===li.id?' open':''}`;
    const badge = isSkip ? '<span class="badge r">Skipped</span>' :
                  hasFi ? `<span class="badge g">${asgn[li.id].length} files</span>` :
                  '<span class="badge y">—</span>';

    html += `<div class="${cls}" data-lid="${li.id}">`;
    html += `<div class="lhead" data-toggle="${li.id}">`;
    html += li.i ? `<img src="${li.i}" onerror="this.style.display='none'">` : '';
    html += `<div class="info"><div class="title">${li.t}</div><div class="meta">$${li.p} &bull; ${li.id}</div></div>`;
    html += `${badge}<span class="arrow">&#9654;</span></div>`;

    if (openId === li.id) {
      html += `<div class="lbody">`;
      if (li.d) html += `<div class="desc-hint">${li.d}</div>`;

      // Assigned
      html += `<div class="section-label">Assigned Files</div>`;
      html += `<div class="assigned-box" data-drop="${li.id}">`;
      if (asgn[li.id]?.length > 0) {
        html += asgn[li.id].map(f => chipHTML(f, true)).join('');
      } else {
        html += `<span class="placeholder">Drop files from Finder here, or click files below</span>`;
      }
      html += `</div>`;

      // (drag files from Finder to assign)

      // Buttons
      html += `<div class="btns">`;
      html += `<button class="btn btn-ok" data-confirm="${li.id}">✓ Confirm</button>`;
      html += `<button class="btn btn-no" data-skip="${li.id}">✗ Skip</button>`;
      html += `<button class="btn btn-clr" data-clear="${li.id}">Clear</button>`;
      html += `</div>`;
      html += `</div>`;
    }
    html += `</div>`;
  }

  el.innerHTML = html;
  stats();
}

function fillBrowse(lid, query) {
  const fg = document.getElementById('fg-' + lid);
  if (!fg) return;
  const q = (query || '').toLowerCase();
  const myFiles = new Set(asgn[lid] || []);
  let html = '';
  let count = 0;
  for (const fname of DATA.f) {
    if (count >= 80) break;
    if (myFiles.has(fname)) continue;
    if (q && !fname.toLowerCase().includes(q)) continue;
    html += chipHTML(fname, false);
    count++;
  }
  fg.innerHTML = html || '<span style="font-size:11px;color:#444">No matches</span>';
}

// Event delegation
document.getElementById('list').addEventListener('click', function(e) {
  const t = e.target;

  // Toggle accordion
  const toggle = t.closest('[data-toggle]');
  if (toggle) {
    const lid = toggle.dataset.toggle;
    openId = openId === lid ? null : lid;
    render();
    return;
  }

  // Remove file
  const rm = t.closest('[data-rm]');
  if (rm) {
    const fname = rm.dataset.rm;
    const listing = t.closest('.listing');
    const lid = listing?.dataset.lid;
    if (lid && asgn[lid]) {
      asgn[lid] = asgn[lid].filter(f => f !== fname);
      save(); render();
    }
    return;
  }

  // Add file (click chip in suggestions or browse)
  const chip = t.closest('.chip');
  if (chip && !t.closest('.assigned-box') && openId) {
    const fname = chip.dataset.f;
    if (!asgn[openId]) asgn[openId] = [];
    if (!asgn[openId].includes(fname)) {
      asgn[openId].push(fname);
      save(); render();
    }
    return;
  }

  // Browse toggle
  const browse = t.closest('[data-browse]');
  if (browse) {
    const lid = browse.dataset.browse;
    const panel = document.getElementById('browse-' + lid);
    if (panel) {
      const showing = panel.style.display !== 'none';
      panel.style.display = showing ? 'none' : 'block';
      if (!showing) fillBrowse(lid, '');
    }
    return;
  }

  // Confirm — just close, don't lock
  const confirm = t.closest('[data-confirm]');
  if (confirm) {
    openId = null;
    save(); render();
    return;
  }

  // Skip
  const skip = t.closest('[data-skip]');
  if (skip) {
    const lid = skip.dataset.skip;
    skips[lid] = true;
    delete asgn[lid];
    openId = null;
    save(); render();
    return;
  }

  // Clear
  const clear = t.closest('[data-clear]');
  if (clear) {
    const lid = clear.dataset.clear;
    delete asgn[lid];
    delete skips[lid];
    save(); render();
    return;
  }
});

// File search
document.getElementById('list').addEventListener('input', function(e) {
  const fs = e.target.closest('[data-fsearch]');
  if (fs) fillBrowse(fs.dataset.fsearch, e.target.value);
});

// (drag handlers registered on document above)
// Also prevent default on body to allow drops
document.body.addEventListener('dragover', function(e) { e.preventDefault(); });
document.body.addEventListener('drop', function(e) { e.preventDefault(); });

// Drag start — use capture phase to catch before browser default
document.addEventListener('dragstart', function(e) {
  const chip = e.target.closest('.chip');
  if (chip && chip.dataset.f) {
    e.dataTransfer.setData('text/plain', chip.dataset.f);
    e.dataTransfer.effectAllowed = 'move';
    chip.style.opacity = '0.4';
    setTimeout(() => { chip.style.opacity = ''; }, 500);
  }
}, true);

// Also handle dragover on the whole document so it works reliably
document.addEventListener('dragover', function(e) {
  const box = e.target.closest('.assigned-box');
  if (box) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; box.classList.add('dragover'); }
}, true);
document.addEventListener('dragleave', function(e) {
  const box = e.target.closest('.assigned-box');
  if (box && !box.contains(e.relatedTarget)) box.classList.remove('dragover');
}, true);
document.addEventListener('drop', function(e) {
  const box = e.target.closest('.assigned-box');
  if (box) {
    e.preventDefault();
    box.classList.remove('dragover');
    const lid = box.dataset.drop;
    if (!lid) return;
    if (!asgn[lid]) asgn[lid] = [];

    // Internal chip drag
    const textData = e.dataTransfer.getData('text/plain');
    if (textData && DATA.f.includes(textData)) {
      if (!asgn[lid].includes(textData)) {
        asgn[lid].push(textData);
        save(); render();
      }
      return;
    }

    // Finder file drop — match by filename
    const files = e.dataTransfer.files;
    if (files && files.length > 0) {
      let added = 0;
      for (const file of files) {
        const fname = file.name;
        // Find matching filename in our file list
        const match = DATA.f.find(f => f === fname);
        if (match && !asgn[lid].includes(match)) {
          asgn[lid].push(match);
          added++;
        }
      }
      if (added > 0) { save(); render(); }
      else {
        // Try partial match (file might have slightly different name)
        const names = Array.from(files).map(f => f.name);
        alert('Could not match: ' + names.join(', ') + '\n\nMake sure the file names match exactly.');
      }
      return;
    }
  }
}, true);

// Search & filter
document.getElementById('search').addEventListener('input', render);
document.getElementById('filter').addEventListener('change', render);

// Export
document.getElementById('expBtn').addEventListener('click', () => {
  const mapping = {};
  for (const [lid, files] of Object.entries(asgn)) {
    if (files.length > 0) {
      const li = DATA.l.find(x => x.id === lid);
      mapping[lid] = { title: li?.t || '', files };
    }
  }
  const blob = new Blob([JSON.stringify(mapping,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'file-mapping.json';
  a.click();
  alert(`Exported ${Object.keys(mapping).length} listings!`);
});

render();
</script>
